<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henox</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background-container">
    <video autoplay loop muted playsinline class="background-media">
        <source src="assets/arkaplan1.mp4" type="video/mp4">
    </video>
</div>

<main class="page">
    <div class="profile">

        <div class="profile-banner">
            <img src="assets/banner.jpg" class="banner-img">
        </div>

        <div class="profile-main">

            <div class="avatar-section">
                <div class="avatar-container">
                    <!-- SABİT AVATAR -->
                    <img src="assets/pp.jpg" class="avatar">
                </div>
            </div>

            <div class="content-section">

                <div class="username-section">
                    <!-- SABİT İSİM -->
                    <h1 class="username">Henox</h1>

                    <div class="presence-bar">
                        <div class="status-dot"></div>
                        <span class="status-text">ONLINE</span>
                    </div>
                </div>

                <!-- SOSYAL LİNKLER (SADELEŞTİRİLDİ) -->
                <div class="social-links">
                    <div class="profile-links">
                        <a href="#" target="_blank" class="profile-link">
                            <i class="fab fa-github"></i>
                        </a>
                    </div>
                </div>

                <div class="location-box">
                    <span>ISTANBUL</span>
                </div>

            </div>
        </div>
    </div>
</main>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 Henox & Efe</p>
</footer>

</body>
</html>
